<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon SMS Guardian</title>
    <style>
      :root {
        --bg: #050816;
        --panel: rgba(8, 15, 35, 0.88);
        --panel-2: rgba(15, 23, 42, 0.92);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-2: #8b5cf6;
        --good: #34d399;
        --bad: #fb7185;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.25), transparent 28%),
          radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.22), transparent 32%),
          var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
      }

      .orb {
        position: absolute;
        width: 420px;
        height: 420px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.36;
        animation: float 8s ease-in-out infinite;
      }

      .orb.one { background: #38bdf8; top: 8%; left: 8%; }
      .orb.two { background: #8b5cf6; bottom: 10%; right: 10%; animation-delay: 2s; }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }

      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 920px;
        padding: 40px;
        border-radius: 28px;
        background: linear-gradient(135deg, var(--panel), var(--panel-2));
        border: 1px solid rgba(255,255,255,0.12);
        box-shadow: 0 0 48px rgba(56, 189, 248, 0.22);
        backdrop-filter: blur(18px);
      }

      .title-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }

      .badge {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent);
      }

      h1 {
        margin: 0;
        font-size: 2.6rem;
        letter-spacing: 0.04em;
      }

      .subtitle {
        color: var(--muted);
        margin: 10px 0 24px;
        line-height: 1.5;
        font-size: 1.05rem;
      }

      textarea {
        width: 100%;
        min-height: 220px;
        padding: 18px 20px;
        font-size: 1.12rem;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(2, 6, 23, 0.55);
        color: var(--text);
        resize: vertical;
        outline: none;
      }

      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.18);
      }

      button {
        margin-top: 18px;
        padding: 16px 24px;
        border: none;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: white;
        font-weight: 800;
        font-size: 1.05rem;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.32);
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
      }

      .result {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 14px;
        font-weight: 600;
        border: 1px solid transparent;
      }

      .spam {
        background: rgba(251, 113, 133, 0.14);
        color: #fecdd3;
        border-color: rgba(251, 113, 133, 0.35);
      }

      .ham {
        background: rgba(52, 211, 153, 0.12);
        color: #bbf7d0;
        border-color: rgba(52, 211, 153, 0.35);
      }

      .status {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.95rem;
      }
      /* animated result pulse */
      .pulse {
        animation: pulseGlow 1.6s ease-in-out 2;
        box-shadow: 0 0 24px rgba(56,189,248,0.22), inset 0 0 12px rgba(255,255,255,0.02);
        transform: translateY(-4px);
      }

      @keyframes pulseGlow {
        0% { box-shadow: 0 0 0 rgba(56,189,248,0); }
        50% { box-shadow: 0 0 28px rgba(56,189,248,0.22); }
        100% { box-shadow: 0 0 0 rgba(56,189,248,0); }
      }

      canvas.confetti {
        position: fixed;
        pointer-events: none;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div class="orb one"></div>
    <div class="orb two"></div>

    <div class="card">
      <div class="title-row">
        <span class="badge"></span>
        <h1>Neon SMS Guardian</h1>
      </div>
      <p class="subtitle">A futuristic spam detector that scans incoming SMS text and predicts whether it is safe or suspicious.</p>
      <textarea id="message" placeholder="Paste or type a message here..."></textarea>
      <button onclick="checkSpam()">Analyze Message</button>
      <div id="result" class="result" style="display:none"></div>
      <div class="status">Powered by your trained model</div>
    </div>

    <canvas class="confetti" id="confettiCanvas"></canvas>
    <script>
      // simple canvas confetti implementation
      const confettiCanvas = document.getElementById('confettiCanvas');
      const ctx = confettiCanvas.getContext('2d');
      let confettiPieces = [];

      function resizeCanvas() {
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function makeConfetti(x, y, count=40) {
        const colors = ['#38bdf8','#8b5cf6','#34d399','#fb7185','#f472b6'];
        for (let i=0;i<count;i++){
          confettiPieces.push({
            x: x,
            y: y,
            vx: (Math.random()-0.5)*8,
            vy: Math.random()*-8-2,
            size: Math.random()*8+4,
            color: colors[Math.floor(Math.random()*colors.length)],
            rot: Math.random()*360,
            rotSpeed: (Math.random()-0.5)*10,
            life: 80 + Math.random()*40
          });
        }
        if (!animationRunning) startConfetti();
      }

      let animationRunning = false;
      function startConfetti(){
        if (animationRunning) return;
        animationRunning = true;
        requestAnimationFrame(confettiLoop);
      }

      function confettiLoop(){
        ctx.clearRect(0,0,confettiCanvas.width, confettiCanvas.height);
        for (let i = confettiPieces.length-1; i>=0; i--) {
          const p = confettiPieces[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.3; // gravity
          p.rot += p.rotSpeed;
          p.life -= 1;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
          ctx.restore();
          if (p.life <= 0 || p.y > confettiCanvas.height + 50) confettiPieces.splice(i,1);
        }
        if (confettiPieces.length>0) requestAnimationFrame(confettiLoop);
        else animationRunning = false;
      }

      async function checkSpam() {
        const message = document.getElementById('message').value.trim();
        const resultBox = document.getElementById('result');

        if (!message) {
          resultBox.style.display = 'block';
          resultBox.className = 'result ham pulse';
          resultBox.textContent = 'Please enter a message first.';
          setTimeout(()=>resultBox.classList.remove('pulse'),1600);
          return;
        }

        resultBox.style.display = 'block';
        resultBox.className = 'result';
        resultBox.textContent = 'Analyzing...';

        try {
          const API_BASE = 'http://127.0.0.1:8001';
          const response = await fetch(API_BASE + '/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
          });

          const rawText = await response.text();
          let data = {};

          if (rawText) {
            try {
              data = JSON.parse(rawText);
            } catch {
              data = { detail: rawText };
            }
          }

          if (!response.ok) {
            throw new Error(data.detail || 'Prediction failed');
          }

          const isSpam = String(data.prediction || 'Ham').toLowerCase() === 'spam';
          resultBox.className = `result ${isSpam ? 'spam' : 'ham'} pulse`;
          resultBox.textContent = `${data.prediction || 'Ham'} (${(Number(data.probability || 0) * 100).toFixed(1)}%)`;
          // trigger confetti for spam only (celebrate detection) or different effect
          if (isSpam) {
            makeConfetti(window.innerWidth/2, window.innerHeight/4, 70);
          }
          setTimeout(()=>resultBox.classList.remove('pulse'),1600);
        } catch (error) {
          resultBox.className = 'result spam pulse';
          resultBox.textContent = error.message;
          setTimeout(()=>resultBox.classList.remove('pulse'),1600);
        }
      }
    </script>
  </body>
</html>
